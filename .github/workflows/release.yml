name: "Publish release"

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  publish-release:
    name: "Publish release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Build release archive
        run: composer make-release

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PREVIOUS_STABLE_TAG="$(git tag --merged "${TAG_NAME}^" --sort=-version:refname | grep -v '-' | head -n 1 || true)"
          if [[ "$TAG_NAME" == *-* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi
          for asset in singlesignon.zip singlesignon.tgz singlesignon.tar.bz2; do
            if [[ ! -f "$asset" ]]; then
              echo "Missing release asset: $asset"
              exit 1
            fi
          done
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          if [[ -n "${PREVIOUS_STABLE_TAG}" ]]; then
            CLI_ARGS="${PREVIOUS_STABLE_TAG}..${TAG_NAME} --strip all"
          else
            CLI_ARGS="--tag ${TAG_NAME} --strip all"
          fi
          echo "cliff_args=${CLI_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Generate release body from git-cliff
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.meta.outputs.cliff_args }}
          github_token: ${{ github.token }}
        env:
          OUTPUT: RELEASE_BODY.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          RELEASE_BODY: ${{ steps.git_cliff.outputs.content }}
        with:
          script: |
            const fs = await import('fs');
            const path = await import('path');
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              name: process.env.TAG_NAME,
              body: process.env.RELEASE_BODY,
              draft: false,
              prerelease: process.env.PRERELEASE === 'true',
            });
            const assets = ['singlesignon.zip', 'singlesignon.tgz', 'singlesignon.tar.bz2'];
            for (const asset of assets) {
              const assetPath = path.resolve(process.cwd(), asset);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: asset,
                data: fs.readFileSync(assetPath),
              });
            }
